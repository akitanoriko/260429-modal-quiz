<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第2章 助動詞クイズ</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#f7f6f3;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
  .card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);max-width:620px;width:100%;padding:2rem}
  h1{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:.25rem}
  .subtitle{font-size:13px;color:#888;margin-bottom:1.5rem}
  .progress-bar{height:5px;background:#eee;border-radius:3px;margin-bottom:1.5rem;overflow:hidden}
  .progress-fill{height:100%;background:#534AB7;border-radius:3px;transition:width .4s ease}
  .section-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:.6rem;letter-spacing:.06em}
  .badge-a{background:#E6F1FB;color:#185FA5}
  .badge-b{background:#dcf5ec;color:#0a6e4a}
  .badge-c{background:#FEF3E2;color:#8a5000}
  .badge-d{background:#EEEDFE;color:#534AB7}
  .qnum{font-size:12px;color:#aaa;margin-bottom:.4rem}
  .qtext{font-size:15px;font-weight:500;color:#1a1a1a;line-height:1.7;margin-bottom:1.25rem;white-space:pre-line}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
  .btn{background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;padding:11px 14px;font-size:13px;color:#333;cursor:pointer;text-align:left;line-height:1.5;transition:background .15s,border-color .15s;font-family:inherit}
  .btn:hover:not(:disabled){background:#f5f4ff;border-color:#a099e0}
  .btn.correct{background:#e8f5e9;border-color:#4caf50;color:#2e7d32;font-weight:500}
  .btn.wrong{background:#fce4ec;border-color:#e57373;color:#c62828}
  .btn:disabled{cursor:default}
  .feedback{font-size:13px;line-height:1.6;padding:11px 14px;border-radius:9px;margin-bottom:1rem;min-height:42px}
  .fb-correct{background:#e8f5e9;color:#2e7d32}
  .fb-wrong{background:#fce4ec;color:#c62828}
  .fb-empty{opacity:0;pointer-events:none}
  .nav-row{display:flex;justify-content:flex-end}
  .next-btn{background:#534AB7;border:none;border-radius:9px;padding:10px 24px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;letter-spacing:.02em}
  .next-btn:hover{background:#3e3596}
  .next-btn:disabled{background:#ccc;cursor:default}
  .result-wrap{text-align:center;padding:.5rem 0}
  .score-ring{width:110px;height:110px;border-radius:50%;border:3px solid #534AB7;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.25rem}
  .score-num{font-size:30px;font-weight:700;color:#534AB7}
  .score-den{font-size:13px;color:#aaa}
  .result-msg{font-size:17px;font-weight:600;color:#1a1a1a;margin-bottom:.3rem}
  .result-sub{font-size:13px;color:#888;margin-bottom:1.5rem}
  .retry-btn{background:#534AB7;border:none;border-radius:9px;padding:10px 28px;font-size:13px;font-weight:600;color:#fff;cursor:pointer}
  .retry-btn:hover{background:#3e3596}
  .review-list{text-align:left;margin-top:1.5rem}
  .review-title{font-size:12px;font-weight:600;color:#888;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
  .review-item{padding:10px 0;border-top:1px solid #f0f0f0;font-size:12px}
  .review-q{color:#333;margin-bottom:4px;line-height:1.5}
  .review-ans{display:flex;gap:14px;flex-wrap:wrap}
  .rv-c{color:#2e7d32}.rv-w{color:#c62828}
</style>
</head>
<body>
<div class="card">
  <h1>第2章　未来の文・助動詞</h1>
  <div class="subtitle">セクション A〜D　全15問</div>
  <div id="quiz"></div>
</div>
<script>
const Q = [
  {sec:"A",q:"I _____ going to get up early tomorrow morning.",ch:["am","is","are","will"],ans:0,exp:"主語が I のとき be going to は am を使います。"},
  {sec:"A",q:"「すぐに暗くなるでしょう」のように未来の予測を表す助動詞は？",ch:["will","can","must","shall"],ans:0,exp:"未来の予測・推量には will を使います。 It will be dark soon."},
  {sec:"A",q:"will not の短縮形は？",ch:["won't","willn't","wont","wouldn't"],ans:0,exp:"will not を縮めると won't になります。"},
  {sec:"A",q:"\"Will you sing for me?\" の意味は？",ch:["歌ってくれませんか。","歌うでしょうか。","歌えますか。","いっしょに歌いましょうか。"],ans:0,exp:"Will you ～? は「～してくれませんか」という依頼を表します。"},
  {sec:"B",q:"「私を手伝ってくれませんか。」を英語で言うと？",ch:["Can you help me?","May you help me?","Will I help you?","Should you help me?"],ans:0,exp:"Can you ～? は「～してくれませんか」という依頼を表します。"},
  {sec:"B",q:"「彼女はすぐに泳げるようになるでしょう。」\nShe _____ be able to swim soon.",ch:["will","can","may","must"],ans:0,exp:"can の未来は will be able to ～ で表します。"},
  {sec:"B",q:"「久美は病気かもしれません。」\nKumi _____ be sick.",ch:["may","must","will","can"],ans:0,exp:"「～かもしれない」という推量は may を使います。"},
  {sec:"B",q:"Could you ～? と Can you ～? を比べると？",ch:["Could you のほうがていねい","Could you のほうがぶれいこう","過去のことを尋ねる表現","どちらも全く同じ"],ans:0,exp:"Could you ～? は Can you ～? よりていねいな依頼の表現です。"},
  {sec:"C",q:"「足元に気をつけなければなりません。」\nYou _____ watch your step.",ch:["must","may","will","would"],ans:0,exp:"「～しなければならない」という義務は must で表します。"},
  {sec:"C",q:"「この部屋に入ってはいけません。」に使う表現は？",ch:["must not","don't have to","should not","cannot"],ans:0,exp:"「～してはいけない」という禁止は must not ～ で表します。"},
  {sec:"C",q:"「トムは今、出発する必要はありません。」\nTom _____ start now.",ch:["doesn't have to","must not","cannot","will not"],ans:0,exp:"「～する必要はない」は don't [doesn't] have to ～ で表します。"},
  {sec:"C",q:"have to ～ の過去形は？",ch:["had to","have been to","was have to","did have to"],ans:0,exp:"have to の過去形は had to です。must は現在形しかないため過去は had to で代用します。"},
  {sec:"D",q:"「（私が）お手伝いしましょうか。」の英文は？",ch:["Shall I help you?","Will I help you?","Can I help you?","May I help you?"],ans:0,exp:"「（私が）～しましょうか」という提案は Shall I ～? を使います。"},
  {sec:"D",q:"\"Shall we go to the library?\" への正しい答え方は？",ch:["Yes, let's.","Yes, please.","Yes, I will.","Sure."],ans:0,exp:"Shall we ～? への答えは Yes, let's. または No, let's not. です。"},
  {sec:"D",q:"\"Would you like some tea?\" の意味は？",ch:["お茶はいかがですか。","お茶を飲んでください。","お茶がほしいですか。","お茶があります。"],ans:0,exp:"Would you like ～? は「～はいかがですか」という勧誘の表現です。"}
];
const BADGE = {A:"badge-a",B:"badge-b",C:"badge-c",D:"badge-d"};
let cur=0,score=0,done=false,results=[],answered=false;
const el=document.getElementById('quiz');

function render(){
  if(cur>=Q.length){renderResult();return;}
  const d=Q[cur];
  const pct=Math.round((cur/Q.length)*100);
  el.innerHTML=`
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <span class="section-badge ${BADGE[d.sec]}">Section ${d.sec}</span>
    <div class="qnum">問 ${cur+1} / ${Q.length}</div>
    <div class="qtext">${d.q}</div>
    <div class="choices" id="ch">
      ${d.ch.map((c,i)=>`<button class="btn" onclick="pick(${i})">${String.fromCharCode(65+i)}. ${c}</button>`).join('')}
    </div>
    <div class="feedback fb-empty" id="fb">　</div>
    <div class="nav-row"><button class="next-btn" id="nxt" onclick="next()" disabled>${cur+1===Q.length?'結果を見る →':'次へ →'}</button></div>
  `;
  answered=false;
}

function pick(i){
  if(answered)return;
  answered=true;
  const d=Q[cur];
  const btns=document.querySelectorAll('.btn');
  btns.forEach(b=>b.disabled=true);
  const ok=i===d.ans;
  if(ok)score++;
  results.push({ok,your:d.ch[i],correct:d.ch[d.ans],exp:d.exp,qtext:d.q});
  btns[i].classList.add(ok?'correct':'wrong');
  if(!ok)btns[d.ans].classList.add('correct');
  const fb=document.getElementById('fb');
  fb.className='feedback '+(ok?'fb-correct':'fb-wrong');
  fb.textContent=(ok?'✓ 正解！　':'✗ 不正解。　')+d.exp;
  document.getElementById('nxt').disabled=false;
}

function next(){cur++;render();}

function renderResult(){
  const pct=Math.round((score/Q.length)*100);
  const msg=pct>=80?'素晴らしい！':pct>=60?'よくできました！':'もう一度復習しましょう。';
  const wrongs=results.map((r,i)=>r.ok?'':
    `<div class="review-item">
      <div class="review-q">問${i+1} ${Q[i].q.replace(/\n/,' ')}</div>
      <div class="review-ans"><span class="rv-w">あなた: ${r.your}</span><span class="rv-c">正解: ${r.correct}</span></div>
    </div>`).filter(Boolean).join('');
  el.innerHTML=`
    <div class="result-wrap">
      <div class="score-ring"><span class="score-num">${score}</span><span class="score-den">/ ${Q.length}</span></div>
      <div class="result-msg">${msg}</div>
      <div class="result-sub">${score} 問正解（${pct}%）</div>
      <button class="retry-btn" onclick="restart()">もう一度挑戦する</button>
      ${wrongs?`<div class="review-list"><div class="review-title">間違えた問題</div>${wrongs}</div>`:'<p style="font-size:13px;color:#2e7d32;margin-top:1.5rem">全問正解！完璧です！</p>'}
    </div>`;
}

function restart(){cur=0;score=0;results=[];render();}
render();
</script>
</body>
</html>
